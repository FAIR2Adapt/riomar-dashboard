name: Software FAIRification Pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - project-items.json

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from project-items.json
        env:
          GH_TOKEN: ${{ secrets.FAIRIFICATION || github.token }}
          ITEMS_FILE: "project-items.json"
          REPO: ${{ github.repository }}
          LABEL: "fairification"
        run: |
          set -euo pipefail

          if [ ! -f "$ITEMS_FILE" ]; then
            echo "Items file not found: $ITEMS_FILE"
            exit 1
          fi

          # Create label if it doesn't exist
          gh label create "$LABEL" --repo "$REPO" \
            --description "FAIR compliance improvement" \
            --color "0e8a16" 2>/dev/null || true

          # Get existing open issue titles with this label
          EXISTING=$(gh issue list --repo "$REPO" --label "$LABEL" --state open --json title --jq '.[].title')

          COUNT=$(jq length "$ITEMS_FILE")
          echo "Processing $COUNT items..."

          CREATED=0
          SKIPPED=0

          for i in $(seq 0 $((COUNT-1))); do
            TITLE=$(jq -r ".[$i].title" "$ITEMS_FILE")
            BODY=$(jq -r ".[$i].body // \"\"" "$ITEMS_FILE")

            if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
              continue
            fi

            # Skip if issue already exists
            if echo "$EXISTING" | grep -qF "$TITLE"; then
              echo "  Exists: $TITLE"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "$LABEL"
            echo "  Created: $TITLE"
            CREATED=$((CREATED + 1))
          done

          echo ""
          echo "Done: $CREATED created, $SKIPPED already existed"
